spring.application.name=db.jdbc

spring.datasource.url=jdbc:postgresql://localhost:5432/articles-test-db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration

api.paths.users=/api/users
api.paths.articles=/api/articles
api.paths.reviews=/api/reviews
api.paths.registration=/api/registration


